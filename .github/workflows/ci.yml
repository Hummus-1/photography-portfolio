name: Continuous Integration

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Linter
        run: pnpm lint

      - name: Run Build Verification
        run: pnpm build
        env:
          # Inject dummy variables if required during build time by Next.js
          NEXT_PUBLIC_SUPABASE_URL: https://dummy-project.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          R2_ACCOUNT_ID: dummy-r2-account-id
          R2_ACCESS_KEY_ID: dummy-r2-access-key-id
          R2_SECRET_ACCESS_KEY: dummy-r2-secret-access-key
          R2_BUCKET_NAME: dummy-r2-bucket
          NEXT_PUBLIC_R2_PUBLIC_URL: https://pub-dummy.r2.dev
          CLOUDFLARE_ACCOUNT_ID: dummy-cf-account-id
          CLOUDFLARE_API_TOKEN: dummy-cf-api-token
